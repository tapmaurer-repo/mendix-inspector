<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Rounded dark background -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="#0A0A0A"/>

  <!-- Inner "mark square" — the distinctive orange-bordered compartment from the brand -->
  <rect x="5" y="5" width="22" height="22" rx="5.5" fill="#1A1A1A" stroke="#FF7A50" stroke-width="2"/>

  <!-- Diagonal slash (the "\" motif) -->
  <line x1="11" y1="10" x2="21" y2="22" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
</svg>
