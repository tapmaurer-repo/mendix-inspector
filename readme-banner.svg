<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">
  <defs>
    <radialGradient id="atmoGlow" cx="70%" cy="90%" r="70%">
      <stop offset="0%" stop-color="#FF7A50" stop-opacity="0.22"/>
      <stop offset="40%" stop-color="#E35A3A" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="atmoRay" cx="10%" cy="5%" r="50%">
      <stop offset="0%" stop-color="#3a2a22" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dotGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#1e1e1e"/>
    </pattern>
    <linearGradient id="accentPill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF7A50"/>
      <stop offset="100%" stop-color="#E35A3A"/>
    </linearGradient>
    <linearGradient id="fadeBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141414" stop-opacity="0"/>
      <stop offset="100%" stop-color="#141414" stop-opacity="1"/>
    </linearGradient>
    <clipPath id="panelClip">
      <rect x="0" y="0" width="400" height="280" rx="12"/>
    </clipPath>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1280" height="400" fill="#080808"/>
  <rect width="1280" height="400" fill="url(#dotGrid)" opacity="0.5"/>
  <rect width="1280" height="400" fill="url(#atmoRay)"/>
  <rect width="1280" height="400" fill="url(#atmoGlow)"/>

  <!-- COMPARTMENT FRAME -->
  <rect x="30" y="30" width="1220" height="340" fill="none" stroke="#222222" stroke-width="1"/>
  <g stroke="#565656" stroke-width="1">
    <line x1="21" y1="30" x2="39" y2="30"/>
    <line x1="30" y1="21" x2="30" y2="39"/>
    <line x1="1241" y1="30" x2="1259" y2="30"/>
    <line x1="1250" y1="21" x2="1250" y2="39"/>
    <line x1="21" y1="370" x2="39" y2="370"/>
    <line x1="30" y1="361" x2="30" y2="379"/>
    <line x1="1241" y1="370" x2="1259" y2="370"/>
    <line x1="1250" y1="361" x2="1250" y2="379"/>
  </g>

  <!-- ========== LEFT SIDE ========== -->
  <!-- Compacted vertical rhythm so content sits centered with breathing room top/bottom -->
  <g transform="translate(75, 55)">
    <!-- Brand mark -->
    <g transform="scale(1.6)">
      <rect x="0" y="0" width="24" height="24" rx="7" fill="#242424"/>
      <rect x="28" y="0" width="24" height="24" rx="7" fill="#1A1A1A" stroke="#FF7A50" stroke-width="1.5"/>
      <rect x="10" y="10" width="4" height="4" rx="0.5" fill="#fff"/>
      <line x1="37" y1="6" x2="43" y2="18" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- BETA pill -->
    <g transform="translate(0, 55)">
      <rect x="0" y="0" width="220" height="28" rx="14" fill="#0a0a0a" stroke="#222222" stroke-width="1"/>
      <rect x="5" y="5" width="40" height="18" rx="9" fill="url(#accentPill)"/>
      <text x="25" y="18" font-family="Geist Mono, monospace" font-size="9" font-weight="700" fill="#0A0A0A" text-anchor="middle" letter-spacing="0.5">BETA</text>
      <text x="54" y="19" font-family="Geist, sans-serif" font-size="12" font-weight="400" fill="#858585">Reads the React Fiber tree</text>
    </g>

    <!-- Title with pixel "e" in "MxInspector" -->
    <text y="148" font-family="Geist, sans-serif" font-size="72" font-weight="500" fill="#EDEDED" letter-spacing="-2.5">
      <tspan x="0">MxInsp</tspan><tspan font-family="Geist Pixel Square, GeistPixelSquare" font-weight="400" letter-spacing="-0.5">e</tspan><tspan letter-spacing="-2.5">ctor</tspan>
    </text>

    <!-- Orange hairline -->
    <g transform="translate(0, 168)">
      <line x1="0" y1="0" x2="220" y2="0" stroke="#FF7A50" stroke-width="1"/>
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#FF7A50" stroke-width="1.2"/>
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#FF7A50" stroke-width="1.2"/>
      <line x1="215" y1="0" x2="225" y2="0" stroke="#FF7A50" stroke-width="1.2"/>
      <line x1="220" y1="-5" x2="220" y2="5" stroke="#FF7A50" stroke-width="1.2"/>
    </g>

    <!-- Subhead -->
    <text x="0" y="194" font-family="Geist, sans-serif" font-size="15" font-weight="400" fill="#858585" letter-spacing="-0.2">DevTools for Mendix · Chrome extension</text>
    <text x="0" y="214" font-family="Geist, sans-serif" font-size="15" font-weight="400" fill="#858585" letter-spacing="-0.2">Zero server calls.</text>

    <!-- Feature nav list -->
    <g transform="translate(0, 240)" font-family="Geist Mono, monospace" font-size="10" letter-spacing="1.8" fill="#FF7A50">
      <text x="0" y="0">INSPECTOR</text>
      <text x="92" y="0" fill="#565656">·</text>
      <text x="108" y="0">PERFORMANCE</text>
      <text x="218" y="0" fill="#565656">·</text>
      <text x="234" y="0">SECURITY</text>
    </g>
  </g>

  <!-- ========== RIGHT SIDE: Main MxInspector panel ========== -->
  <g transform="translate(700, 60)">
    <!-- Panel outer -->
    <rect x="0" y="0" width="400" height="280" rx="12" fill="#141414" stroke="#2E2E2E" stroke-width="1"/>

    <g clip-path="url(#panelClip)">
      <!-- HEADER -->
      <rect x="0" y="0" width="400" height="44" fill="#1A1A1A"/>
      <line x1="0" y1="44" x2="400" y2="44" stroke="#222" stroke-width="1"/>
      <!-- Brand mark -->
      <g transform="translate(14, 13)">
        <rect x="0" y="0" width="19" height="19" rx="5.5" fill="#242424"/>
        <rect x="22" y="0" width="19" height="19" rx="5.5" fill="#1A1A1A" stroke="#FF7A50" stroke-width="1.2"/>
        <rect x="8" y="8" width="3" height="3" rx="0.5" fill="#fff"/>
        <line x1="29" y1="5" x2="34" y2="14" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      </g>
      <text x="62" y="29" font-family="Geist, sans-serif" font-size="13" font-weight="600" fill="#EDEDED" letter-spacing="-0.2">MxInspector</text>
      <!-- Version pill -->
      <g transform="translate(154, 14)">
        <rect x="0" y="0" width="52" height="18" rx="4" fill="#0a0a0a" stroke="#2e2e2e" stroke-width="0.8"/>
        <text x="26" y="12" font-family="Geist Mono, monospace" font-size="9" fill="#858585" text-anchor="middle">10.24.15</text>
      </g>
      <!-- React accent pill -->
      <g transform="translate(214, 14)">
        <rect x="0" y="0" width="42" height="18" rx="4" fill="#2a1f15" stroke="#FF7A50" stroke-width="0.8"/>
        <text x="21" y="12" font-family="Geist Mono, monospace" font-size="9" font-weight="500" fill="#FFB090" text-anchor="middle">React</text>
      </g>
      <!-- Header right icons -->
      <g transform="translate(350, 13)" stroke="#565656" stroke-width="1.2" fill="none">
        <circle cx="7" cy="9" r="5.5"/>
        <circle cx="7" cy="7" r="0.6" fill="#565656" stroke="none"/>
        <line x1="7" y1="9" x2="7" y2="12"/>
        <g transform="translate(22, 4)" stroke="#858585" stroke-width="1.4" stroke-linecap="round">
          <line x1="0" y1="0" x2="8" y2="8"/>
          <line x1="8" y1="0" x2="0" y2="8"/>
        </g>
      </g>

      <!-- ENV BAR -->
      <g transform="translate(0, 44)">
        <rect x="0" y="0" width="400" height="30" fill="#0f0f0f"/>
        <line x1="0" y1="30" x2="400" y2="30" stroke="#191919" stroke-width="1"/>
        <circle cx="18" cy="15" r="3.5" fill="#FF7A50"/>
        <text x="30" y="19" font-family="Geist, sans-serif" font-size="11" font-weight="500" fill="#EDEDED">Local</text>
        <text x="62" y="19" font-family="Geist Mono, monospace" font-size="10" fill="#E8C56A">http://localhost:8082/</text>
      </g>

      <!-- META PILLS -->
      <g transform="translate(14, 88)">
        <g>
          <rect x="0" y="0" width="122" height="22" rx="5" fill="#0f0f0f" stroke="#222" stroke-width="0.8"/>
          <text x="8" y="15" font-family="Geist, sans-serif" font-size="10" fill="#858585">Desktop</text>
          <text x="56" y="15" font-family="Geist, sans-serif" font-size="10" fill="#565656">·</text>
          <text x="63" y="15" font-family="Geist, sans-serif" font-size="10" fill="#EDEDED">Responsive</text>
        </g>
        <g transform="translate(130, 0)">
          <rect x="0" y="0" width="148" height="22" rx="5" fill="#0f0f0f" stroke="#222" stroke-width="0.8"/>
          <text x="8" y="15" font-family="Geist, sans-serif" font-size="10" fill="#858585">Language</text>
          <text x="62" y="15" font-family="Geist, sans-serif" font-size="10" fill="#565656">·</text>
          <text x="69" y="15" font-family="Geist, sans-serif" font-size="10" fill="#EDEDED">English US</text>
        </g>
      </g>

      <!-- HEALTH CARD -->
      <g transform="translate(14, 122)">
        <rect x="0" y="0" width="372" height="62" rx="8" fill="#0f0f0f" stroke="#222" stroke-width="0.8"/>
        <text x="18" y="42" font-family="Geist, sans-serif" font-size="38" font-weight="500" fill="#3CB979" letter-spacing="-1.5">93</text>
        <text x="78" y="28" font-family="Geist, sans-serif" font-size="13" font-weight="600" fill="#EDEDED">Health: Excellent</text>
        <text x="78" y="44" font-family="Geist, sans-serif" font-size="11" fill="#858585">7 insights · 32 widgets</text>
        <g transform="translate(346, 28)" stroke="#565656" stroke-width="1.2" fill="none">
          <circle cx="7" cy="7" r="6"/>
          <circle cx="7" cy="4.5" r="0.7" fill="#565656" stroke="none"/>
          <line x1="7" y1="6.5" x2="7" y2="10"/>
        </g>
      </g>

      <!-- APPLICATION CARD -->
      <g transform="translate(14, 194)">
        <rect x="0" y="0" width="372" height="90" rx="8" fill="#0f0f0f" stroke="#222" stroke-width="0.8"/>
        <text x="14" y="20" font-family="Geist Mono, monospace" font-size="9" fill="#565656" letter-spacing="0.8">APPLICATION</text>
        <text x="14" y="38" font-family="Geist, sans-serif" font-size="14" font-weight="600" fill="#EDEDED">Planner_Homepage</text>
        <g transform="translate(346, 24)" stroke="#565656" stroke-width="1.2" fill="none">
          <rect x="0" y="0" width="8" height="9" rx="1"/>
          <rect x="3" y="3" width="8" height="9" rx="1"/>
        </g>
        <line x1="14" y1="52" x2="358" y2="52" stroke="#1e1e1e" stroke-width="0.8"/>
        <text x="14" y="70" font-family="Geist Mono, monospace" font-size="9" fill="#565656" letter-spacing="0.8">CONTEXT OBJECTS</text>
        <g font-family="Geist Mono, monospace" font-size="9">
          <g transform="translate(14, 76)">
            <rect x="0" y="0" width="116" height="16" rx="4" fill="#1a1a1a" stroke="#2e2e2e" stroke-width="0.6"/>
            <text x="8" y="11" fill="#EDEDED">Masterdata.Product</text>
          </g>
          <g transform="translate(134, 76)">
            <rect x="0" y="0" width="92" height="16" rx="4" fill="#1a1a1a" stroke="#2e2e2e" stroke-width="0.6"/>
            <text x="8" y="11" fill="#EDEDED">MRPRun.MRPRun</text>
          </g>
          <g transform="translate(230, 76)">
            <rect x="0" y="0" width="90" height="16" rx="4" fill="#1a1a1a" stroke="#2e2e2e" stroke-width="0.6"/>
            <text x="8" y="11" fill="#EDEDED">MRPRun.Filters</text>
          </g>
        </g>
      </g>

      <!-- Bottom fade -->
      <rect x="0" y="230" width="400" height="50" fill="url(#fadeBottom)"/>
    </g>

    <!-- Floating "reading fiber tree" pill (top-left, outside panel) -->
    <g transform="translate(-80, -18)">
      <rect x="0" y="0" width="154" height="30" rx="15" fill="#0f0f0f" stroke="#2E2E2E" stroke-width="1"/>
      <circle cx="16" cy="15" r="4" fill="#FF7A50"/>
      <text x="30" y="20" font-family="Geist, sans-serif" font-size="12" font-weight="500" fill="#EDEDED">reading fiber tree</text>
    </g>

    <!-- Floating "0 server calls" pill (bottom-right, outside panel) -->
    <g transform="translate(282, 266)">
      <rect x="0" y="0" width="128" height="30" rx="15" fill="#0f0f0f" stroke="#2E2E2E" stroke-width="1"/>
      <circle cx="16" cy="15" r="4" fill="#3CB979"/>
      <text x="30" y="20" font-family="Geist, sans-serif" font-size="12" font-weight="500" fill="#EDEDED">0 server calls</text>
    </g>
  </g>
</svg>
